services:
  # Static site: login, dashboard, schedule, attendance, chat.
  - type: web
    name: instance-tracker-site
    env: static
    buildCommand: ""
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Runs every minute, independent of any browser tab being open. Sends
  # email reminders 5 minutes before each person's scheduled slot.
  - type: cron
    name: instance-tracker-reminder
    env: node
    rootDir: cron
    schedule: "* * * * *"
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM
        value: "InstanceTrack <onboarding@resend.dev>"
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: REMINDER_MINUTES_BEFORE
        value: "5"
