services:
  # Static site: login, dashboard, schedule, attendance, chat. Free forever
  # on Render, no card required.
  #
  # The reminder scheduler is NOT a Render Cron Job — Render requires a paid
  # plan for those (min $1/mo). It runs instead as a free GitHub Actions
  # scheduled workflow — see .github/workflows/reminder.yml.
  - type: web
    name: instance-tracker-site
    env: static
    buildCommand: ""
    staticPublishPath: ./public
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
