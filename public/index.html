<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>InstanceTrack — Login</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card card">
      <div class="brand">
        <div class="brand-mark">IT</div>
        <div class="brand-text">
          <h1>InstanceTrack</h1>
          <p>Shared instance login & attendance tracker</p>
        </div>
      </div>

      <div id="configWarning" class="auth-error" style="display:none;">
        ⚠️ Firebase isn't configured yet. Ask your admin to complete the setup in <code>public/js/firebase-config.js</code> (see README.md).
      </div>
      <div id="authError" class="auth-error"></div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label for="email">Email</label>
          <input type="email" id="email" name="email" placeholder="you@company.com" required />
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn btn-block" id="loginBtn">Sign in</button>
      </form>
    </div>
  </div>

  <script type="module" src="js/auth.js"></script>
</body>
</html>
